name: Daily price update

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Fetch daily prices
        id: fetch
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          MASSIVE_QUOTE_URL: ${{ secrets.MASSIVE_QUOTE_URL }}
          MASSIVE_QUOTE_FIELD: ${{ secrets.MASSIVE_QUOTE_FIELD }}
        run: npm run fetch-daily
        continue-on-error: true # allow commit to run even when weekday guard fires

      - name: Build prices.json
        run: npm run build-prices

      - name: Build dataset artifacts
        run: npm run build-dataset

      - name: Sync entity holdings
        run: npm run holdings:sync
        continue-on-error: true # a transient scrape miss must not block the price commit

      - name: Validate entity holdings
        run: npm run holdings:check

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add data/prices.ndjson static/prices.json static/prices-latest.json static/meta.json static/health.json static/data static/api
          git diff --cached --quiet || git commit -m "chore: daily price update $DATE"
          git add src/lib/entity-holdings.json
          git diff --cached --quiet || git commit -m "chore(holdings): daily sync $DATE"
          git push

      - name: Fail if fetch had upstream issues
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "::error::fetch-daily exited non-zero — all sources returned 0 rows on a weekday. Data was forward-filled and committed; check health.json for details."
          exit 1
