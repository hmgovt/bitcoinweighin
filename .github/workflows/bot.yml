name: X bot

# Four posts/day, one per commodity, varied format (see scripts/bot/config.json).
# run.ts maps the firing UTC hour to the due slot. Cron times are UTC and
# correspond to ~9a / 1p / 5p / 9p ET (EDT). GitHub may delay scheduled runs
# under load; the ±2h slot-match tolerance absorbs that.
on:
  schedule:
    - cron: '0 13 * * *' # gold-am     (~9a ET)
    - cron: '0 17 * * *' # silver-mid  (~1p ET)
    - cron: '0 21 * * *' # cocaine-eve (~5p ET)
    - cron: '0 1 * * *'  # pu238-night (~9p ET previous day)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot id to run (blank = auto by current UTC hour)'
        type: string
        default: ''
      dry_run:
        description: 'Compose + render, but do not post'
        type: boolean
        default: true

# Only one bot run at a time so concurrent runs never race the state file.
concurrency:
  group: x-bot
  cancel-in-progress: false

permissions:
  contents: write # commit data/bot-state.json back

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run bot
        env:
          SITE_BASE_URL: https://bitcoinweighin.com
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.slot }}" ]; then ARGS="$ARGS --slot=${{ github.event.inputs.slot }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "run.ts$ARGS"
          npm run bot -- $ARGS

      - name: Commit state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bot-state.json
          git diff --cached --quiet || git commit -m "chore(bot): state $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
