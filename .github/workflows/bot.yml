name: X bot

# Five posts/day: 4 commodities + a Hashweight (network mining-hardware mass)
# post, varied format (see scripts/bot/config.json).
# run.ts uses catch-up selection: each run posts the earliest slot due today
# (UTC) that hasn't posted yet and is within slotCatchupHours. GitHub often
# delays scheduled runs 1–4h, so each slot has a primary cron at its time plus
# a +2h catch-up cron; whichever fires first within the window posts the slot.
# Cron times are UTC (~9a / 11a / 1p / 5p / 9p ET, EDT).
on:
  schedule:
    - cron: '0 13 * * *' # gold-am        primary  (~9a ET)
    - cron: '0 15 * * *' # gold-am catch-up / hashweight-mid primary (~11a ET)
    - cron: '0 17 * * *' # silver-mid  primary  (~1p ET)
    - cron: '0 19 * * *' # silver-mid  catch-up
    - cron: '0 21 * * *' # cocaine-eve primary  (~5p ET)
    - cron: '0 23 * * *' # cocaine-eve catch-up
    - cron: '0 1 * * *'  # pu238-night primary  (~9p ET previous day)
    - cron: '0 3 * * *'  # pu238-night catch-up
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot id to run (blank = auto by current UTC hour)'
        type: string
        default: ''
      dry_run:
        description: 'Compose + render, but do not post'
        type: boolean
        default: true

# Only one bot run at a time so concurrent runs never race the state file.
concurrency:
  group: x-bot
  cancel-in-progress: false

permissions:
  contents: write # commit data/bot-state.json back

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run bot
        env:
          SITE_BASE_URL: https://bitcoinweighin.com
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.slot }}" ]; then ARGS="$ARGS --slot=${{ github.event.inputs.slot }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "run.ts$ARGS"
          npm run bot -- $ARGS

      - name: Commit state
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bot-state.json
          git diff --cached --quiet || git commit -m "chore(bot): state $(date -u +%Y-%m-%dT%H:%MZ)"
          # Push with rebase-and-retry. The bot's concurrency group serialises
          # bot-vs-bot, but not bot-vs-daily-update or bot-vs-manual pushes —
          # those races would otherwise silently drop the bot-state commit
          # and re-post the same slot next cron.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected — fetching and rebasing"
            git fetch origin main
            git rebase origin/main || {
              echo "::error::Rebase conflict on attempt $attempt — aborting"
              git rebase --abort || true
              exit 1
            }
            sleep $((attempt * 3))
          done
          echo "::error::Push failed after 5 attempts"
          exit 1
