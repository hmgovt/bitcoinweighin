<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="%sveltekit.assets%/fonts/inter-tight-latin.woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			as="font"
			type="font/woff2"
			href="%sveltekit.assets%/fonts/jetbrains-mono-latin.woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			as="fetch"
			href="%sveltekit.assets%/prices.json"
			fetchpriority="high"
		/>
		<link
			rel="preload"
			as="image"
			href="%sveltekit.assets%/sprites/references/shiba_inu.webp"
			imagesrcset="%sveltekit.assets%/sprites/references/shiba_inu@1x.webp 1x, %sveltekit.assets%/sprites/references/shiba_inu.webp 2x"
			fetchpriority="high"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
