<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="#cc2030" stroke="#333" stroke-width="1.5">
  <!-- bus body -->
  <rect x="8" y="14" width="264" height="86" rx="6"/>
  <!-- top deck windows -->
  <g fill="#cce" stroke="#333" stroke-width="1">
    <rect x="18" y="22" width="22" height="20"/>
    <rect x="42" y="22" width="22" height="20"/>
    <rect x="66" y="22" width="22" height="20"/>
    <rect x="90" y="22" width="22" height="20"/>
    <rect x="114" y="22" width="22" height="20"/>
    <rect x="138" y="22" width="22" height="20"/>
    <rect x="162" y="22" width="22" height="20"/>
    <rect x="186" y="22" width="22" height="20"/>
    <rect x="210" y="22" width="22" height="20"/>
    <rect x="234" y="22" width="28" height="20"/>
  </g>
  <!-- middle band -->
  <rect x="8" y="46" width="264" height="6" fill="#fff" stroke="none"/>
  <!-- bottom deck windows -->
  <g fill="#cce" stroke="#333" stroke-width="1">
    <rect x="18" y="58" width="22" height="22"/>
    <rect x="42" y="58" width="22" height="22"/>
    <rect x="66" y="58" width="22" height="22"/>
    <rect x="90" y="58" width="22" height="22"/>
    <rect x="114" y="58" width="22" height="22"/>
    <rect x="138" y="58" width="22" height="22"/>
    <rect x="162" y="58" width="22" height="22"/>
    <rect x="186" y="58" width="22" height="22"/>
    <rect x="210" y="58" width="22" height="22"/>
  </g>
  <!-- driver window -->
  <rect x="234" y="58" width="28" height="22" fill="#cce" stroke="#333" stroke-width="1"/>
  <!-- wheels -->
  <circle cx="48" cy="104" r="12" fill="#222"/>
  <circle cx="48" cy="104" r="4" fill="#888"/>
  <circle cx="232" cy="104" r="12" fill="#222"/>
  <circle cx="232" cy="104" r="4" fill="#888"/>
</svg>
